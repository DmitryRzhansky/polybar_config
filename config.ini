[colors]
bg = #CC050509
capsule = #1E2633
fg = #D8DEE9
muted = #7C8798

; Nord accents per group
pink = #B48EAD
frost = #88C0D0
green = #A3BE8C
yellow = #EBCB8B
violet = #8b5cf6
red = #BF616A
warn = #EBCB8B
bad = #BF616A
accent = #A3BE8C
bg-alt = #1E2633

[bar/main]
width = 100%
height = 26pt
bottom = true
fixed-center = true

background = #00000000
foreground = ${colors.fg}

line-size = 2
border-size = 0pt
padding-left = 1
padding-right = 1
module-margin = 0

font-0 = monospace:size=9;2
font-1 = JetBrainsMono Nerd Font:size=11;3
font-2 = JetBrainsMono Nerd Font Propo:size=12;3

modules-left = i3
modules-center =
modules-right = power love-dasha xkeyboard gap vpn network gap cpu temp memory filesystem gap pulseaudio battery gap date gap tray

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true
wm-restack = i3

border-top-size = 5
border-bottom-size = 5
border-left-size = 8
border-right-size = 8
border-color = #00000000
radius = 0

; ── Capsule edges & gaps ──────────────────────────────────

[module/gap]
type = custom/text
format = "  "

; ── Modules ───────────────────────────────────────────────

[module/i3]
type = internal/i3
index-sort = true
wrapping-scroll = false
format = <label-state>
format-background = ${colors.capsule}

label-focused = %index%
label-focused-background = ${colors.capsule}
label-focused-foreground = ${colors.green}
label-focused-underline = ${colors.green}
label-focused-padding = 1

label-unfocused = %index%
label-unfocused-background = ${colors.capsule}
label-unfocused-foreground = ${colors.muted}
label-unfocused-padding = 1

label-visible = %index%
label-visible-background = ${colors.capsule}
label-visible-padding = 1

label-urgent = %index%
label-urgent-background = ${colors.red}
label-urgent-foreground = #FFFFFF
label-urgent-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:90:...%
label-foreground = ${colors.fg}

[module/power]
type = custom/text
format = " %{T3}󰐥%{T-} "
format-background = ${colors.capsule}
format-foreground = ${colors.red}
format-padding = 1
click-left = ~/.config/polybar/scripts/powermenu.sh

[module/love-dasha]
type = custom/text
format = "Я люблю Дашу %{F#B48EAD}♥%{F-}"
format-background = ${colors.capsule}
format-foreground = ${colors.fg}
format-padding = 1

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock
blacklist-1 = scroll lock
format = <label-layout>
format-background = ${colors.capsule}
format-padding = 1
format-prefix = "󰌌 "
format-prefix-foreground = ${colors.pink}
label-layout = %layout%
label-layout-foreground = ${colors.pink}

[module/vpn]
type = custom/script
exec = ~/.config/polybar/scripts/vpn.sh
interval = 5
format = <label>
format-background = ${colors.capsule}
format-padding = 1
format-prefix = "󰖂 "
format-prefix-foreground = ${colors.frost}
label = %output%
label-foreground = ${colors.frost}

[module/network]
type = internal/network
interface = ${env:NET_IFACE}
interval = 3

format-connected = <label-connected>
format-connected-background = ${colors.capsule}
format-connected-padding = 1
format-connected-prefix = "󰛳 "
format-connected-prefix-foreground = ${colors.frost}
label-connected = %local_ip% ↓%downspeed% ↑%upspeed%
label-connected-foreground = ${colors.fg}

format-disconnected = <label-disconnected>
format-disconnected-background = ${colors.capsule}
format-disconnected-padding = 1
format-disconnected-prefix = "󰲛 "
format-disconnected-prefix-foreground = ${colors.red}
label-disconnected = down
label-disconnected-foreground = ${colors.red}

[module/cpu]
type = internal/cpu
interval = 2
format = <label>
format-background = ${colors.capsule}
format-padding = 1
format-prefix = "󰻠 "
format-prefix-foreground = ${colors.green}
label = %percentage%%
label-foreground = ${colors.fg}

[module/temp]
type = custom/script
exec = ~/.config/polybar/scripts/temp.sh
interval = 5
format = <label>
format-background = ${colors.capsule}
format-padding = 1
label = %output%
label-foreground = ${colors.fg}

[module/memory]
type = internal/memory
interval = 3
format = <label>
format-background = ${colors.capsule}
format-padding = 1
format-prefix = "󰍛 "
format-prefix-foreground = ${colors.green}
label = %gb_used%/%gb_total%
label-foreground = ${colors.fg}

[module/filesystem]
type = internal/fs
interval = 30
mount-0 = /
format-mounted = <label-mounted>
format-mounted-background = ${colors.capsule}
format-mounted-padding = 1
format-mounted-prefix = "󰋊 "
format-mounted-prefix-foreground = ${colors.green}
label-mounted = %free%
label-mounted-foreground = ${colors.fg}

format-unmounted = <label-unmounted>
format-unmounted-background = ${colors.capsule}
format-unmounted-padding = 1
format-unmounted-prefix = "󰋊 "
format-unmounted-prefix-foreground = ${colors.red}
label-unmounted = n/a
label-unmounted-foreground = ${colors.red}

[module/pulseaudio]
type = internal/pulseaudio

format-volume = <ramp-volume> <label-volume>
format-volume-background = ${colors.capsule}
format-volume-padding = 1
label-volume = %percentage%%
label-volume-foreground = ${colors.fg}

ramp-volume-0 = 󰕿
ramp-volume-1 = 󰖀
ramp-volume-2 = 󰕾
ramp-volume-foreground = ${colors.yellow}

format-muted = <label-muted>
format-muted-background = ${colors.capsule}
format-muted-padding = 1
label-muted = 󰖁 mute
label-muted-foreground = ${colors.red}

[module/battery]
type = internal/battery
battery = ${env:BATTERY}
adapter = ${env:ADAPTER}
full-at = 98
poll-interval = 10

format-charging = <animation-charging> <label-charging>
format-charging-background = ${colors.capsule}
format-charging-padding = 1
label-charging = %percentage%%+
label-charging-foreground = ${colors.fg}

animation-charging-0 = 󰢜
animation-charging-1 = 󰂆
animation-charging-2 = 󰂇
animation-charging-3 = 󰂈
animation-charging-4 = 󰂉
animation-charging-5 = 󰂊
animation-charging-6 = 󰂋
animation-charging-7 = 󰂅
animation-charging-foreground = ${colors.green}
animation-charging-framerate = 750

format-discharging = <ramp-capacity> <label-discharging>
format-discharging-background = ${colors.capsule}
format-discharging-padding = 1
label-discharging = %percentage%%
label-discharging-foreground = ${colors.fg}

ramp-capacity-0 = 󰁺
ramp-capacity-1 = 󰁻
ramp-capacity-2 = 󰁼
ramp-capacity-3 = 󰁽
ramp-capacity-4 = 󰁾
ramp-capacity-5 = 󰁿
ramp-capacity-6 = 󰂀
ramp-capacity-7 = 󰂁
ramp-capacity-8 = 󰂂
ramp-capacity-9 = 󰁹
ramp-capacity-foreground = ${colors.yellow}
ramp-capacity-0-foreground = ${colors.red}
ramp-capacity-1-foreground = ${colors.red}

format-full = <label-full>
format-full-background = ${colors.capsule}
format-full-padding = 1
format-full-prefix = "󰁹 "
format-full-prefix-foreground = ${colors.green}
label-full = full
label-full-foreground = ${colors.fg}

[module/date]
type = custom/script
exec = date '+%d.%m.%Y %H:%M:%S'
interval = 1
format = <label>
format-background = ${colors.capsule}
format-padding = 1
format-prefix = "󰃰 "
format-prefix-foreground = ${colors.violet}
label = %output%
label-foreground = ${colors.fg}
click-left = orage

[module/tray]
type = internal/tray
format-background = ${colors.capsule}
format-padding = 1
tray-background = ${colors.capsule}
tray-spacing = 4pt
tray-size = 66%
